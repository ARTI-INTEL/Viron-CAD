<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultimate CAD</title>
  <link rel="icon" href="images/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/server-page.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1569721534768808"
     crossorigin="anonymous"></script>
  <link rel="stylesheet" href="css/toast.css">
</head>
<body>
<div class="page-wrapper" id="server-root">

  <!-- ======== NAVBAR ======== -->
  <div class="sp-navbar" id="sp-navbar">
    <span class="sp-welcome-text" id="sp-welcome-text">Welcome to Ultimate CAD</span>
    <div class="sp-nav-actions">
      <!-- Owner-only: hidden by default, shown via JS -->
      <button class="sp-nav-btn sp-nav-btn--settings" id="btn-server-settings">Server Settings</button>
      <button class="sp-nav-btn sp-nav-btn--dashboard" id="btn-dashboard">Dashboard</button>
    </div>
  </div>

  <!-- ======== DEPARTMENT PANELS ======== -->
  <div class="sp-panels-row">

    <!-- LEO Panel -->
    <div class="sp-dept-panel" id="panel-leo">
      <p class="dept-heading">Law Enforcement</p>
      <div class="sp-field-group">
        <div class="sp-field-box">
          <input class="sp-field-input" id="leo-name" placeholder="Name" autocomplete="off">
        </div>
        <div class="sp-field-box">
          <input class="sp-field-input" id="leo-callsign" placeholder="Callsign" autocomplete="off">
        </div>
        <div class="sp-field-box">
          <input class="sp-field-input" id="leo-rank" placeholder="Rank" autocomplete="off">
        </div>
        <div class="sp-field-box">
          <select class="sp-field-input sp-field-select" id="leo-department">
            <option value="">Law Enforcement</option>
          </select>
        </div>
      </div>
      <p class="sp-error-msg" id="leo-error"></p>
      <button class="sp-join-btn sp-join-btn--leo" id="btn-join-leo">Join LEO CAD</button>
    </div>

    <!-- F&R Panel -->
    <div class="sp-dept-panel" id="panel-fr">
      <p class="dept-heading">Fire and Rescue</p>
      <div class="sp-field-group">
        <div class="sp-field-box">
          <input class="sp-field-input" id="fr-name" placeholder="Name" autocomplete="off">
        </div>
        <div class="sp-field-box">
          <input class="sp-field-input" id="fr-callsign" placeholder="Callsign" autocomplete="off">
        </div>
        <div class="sp-field-box">
          <input class="sp-field-input" id="fr-rank" placeholder="Rank" autocomplete="off">
        </div>
        <div class="sp-field-box">
          <select class="sp-field-input sp-field-select" id="fr-department">
            <option value="">Fire and Rescue</option>
          </select>
        </div>
      </div>
      <p class="sp-error-msg" id="fr-error"></p>
      <button class="sp-join-btn sp-join-btn--fr" id="btn-join-fr">Join F&amp;R CAD</button>
    </div>

    <!-- DOT Panel -->
    <div class="sp-dept-panel" id="panel-dot">
      <p class="dept-heading">Dept of Transport</p>
      <div class="sp-field-group">
        <div class="sp-field-box">
          <input class="sp-field-input" id="dot-name" placeholder="Name" autocomplete="off">
        </div>
        <div class="sp-field-box">
          <input class="sp-field-input" id="dot-callsign" placeholder="Callsign" autocomplete="off">
        </div>
        <div class="sp-field-box">
          <input class="sp-field-input" id="dot-rank" placeholder="Rank" autocomplete="off">
        </div>
        <div class="sp-field-box">
          <select class="sp-field-input sp-field-select" id="dot-department">
            <option value="">Dept of Transport</option>
          </select>
        </div>
      </div>
      <p class="sp-error-msg" id="dot-error"></p>
      <button class="sp-join-btn sp-join-btn--dot" id="btn-join-dot">Join DOT CAD</button>
    </div>

  </div><!-- /.sp-panels-row -->

  <!-- ======== BOTTOM ACTIONS ======== -->
  <div class="sp-bottom-bar">
    <button class="sp-bottom-btn" id="btn-civilian">Civilian / Character</button>
    <button class="sp-bottom-btn" id="btn-dispatcher">Dispatcher</button>
  </div>

</div><!-- /.page-wrapper -->


<script src="js/toast.js"></script>
<script src="js/shared.js"></script>
<script src="js/server-page.js"></script>
</body>
</html>
