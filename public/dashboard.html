<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultimate CAD</title>
  <link rel="icon" href="images/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1569721534768808"
     crossorigin="anonymous"></script>
  <link rel="stylesheet" href="css/toast.css">
</head>
<body>
<div class="page-wrapper">

  <!-- ======== NAVBAR ======== -->
  <div class="navbar navbar-dark">
    <span class="db-nav-title" id="db-nav-greeting">Welcome to Ultimate CAD</span>
    <button class="nav-btn nav-btn-dark db-nav-settings" id="btn-settings">Settings</button>
  </div>

  <!-- ======== SERVERS PANEL HEADER ======== -->
  <div class="db-panel-header panel-header">
    <span class="db-panel-label">Server</span>
    <div class="db-search-box">
      <input
        class="db-search-input"
        type="text"
        placeholder="Search"
        id="server-search"
        autocomplete="off"
      >
    </div>
  </div>

  <!-- ======== SERVERS PANEL BODY ======== -->
  <div class="db-panel-body panel-body" id="servers-list">
    <!-- Rows injected by dashboard.js -->
  </div>

  <!-- ======== BOTTOM BUTTONS ======== -->
  <div class="db-bottom-bar">
    <button class="action-btn db-create-btn" id="btn-create-server">Create Server</button>
    <button class="action-btn action-btn-blue db-join-btn" id="btn-join-server">Join Server</button>
  </div>

  <!-- ======== CREATE SERVER MODAL ======== -->
  <div class="modal-overlay" id="modal-create-server" role="dialog" aria-modal="true" aria-label="Create Server">
    <div class="db-modal-box modal-box">

      <!-- Close -->
      <button class="close-btn" id="btn-modal-close" aria-label="Close">✕</button>

      <!-- Row 1: Server Name · Join Code · Description -->
      <div class="db-modal-row">
        <div class="db-field">
          <label class="db-field-label" for="field-server-name">Server Name</label>
          <input class="db-field-input" id="field-server-name" placeholder="My Roleplay Server" autocomplete="off">
        </div>
        <div class="db-field db-field--sm">
          <label class="db-field-label" for="field-join-code">Join Code</label>
          <input class="db-field-input db-field-input--mono" id="field-join-code" placeholder="AUTO" maxlength="12" autocomplete="off">
        </div>
        <div class="db-field db-field--wide">
          <label class="db-field-label" for="field-description">Description</label>
          <input class="db-field-input" id="field-description" placeholder="Short description (optional)" autocomplete="off">
        </div>
      </div>

      <!-- Row 2: Discord Server dropdown -->
      <div class="db-modal-row db-modal-row--bottom">
        <div class="db-field db-field--sm">
          <label class="db-field-label" for="field-discord-server">Discord Server</label>
          <select class="db-field-input db-field-select" id="field-discord-server">
            <option value=""> Select Discord Server </option>
          </select>
        </div>

        <!-- Create button sits on the right end of this row -->
        <button class="action-btn action-btn-blue db-modal-create-btn" id="btn-modal-create">Create</button>
      </div>

    </div>
  </div>

</div><!-- /.page-wrapper -->


<script src="js/toast.js"></script>
<script src="js/shared.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
